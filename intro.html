<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Motovise - Performance Luxury</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        @layer utilities {
            .animate-intro-logo {
                animation: intro-logo 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            }
            .animate-intro-text {
                animation: intro-text 3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
                animation-delay: 0.5s;
                opacity: 0;
            }
            .animate-intro-line {
                animation: intro-line 2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
                animation-delay: 0.8s;
                width: 0;
            }
            .animate-intro-glow {
                animation: intro-glow 4s ease-in-out infinite alternate;
            }
            .animate-overlay-dismiss {
                animation: overlay-fade 0.8s ease-in-out forwards;
                animation-delay: 3.5s;
            }
        }
        @keyframes intro-logo {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes intro-text {
            0% { opacity: 0; transform: translateY(10px); letter-spacing: 0.6em; }
            100% { opacity: 1; transform: translateY(0); letter-spacing: 0.4em; }
        }
        @keyframes intro-line {
            0% { width: 0; opacity: 0; }
            100% { width: 120px; opacity: 1; }
        }
        @keyframes intro-glow {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 0.4; transform: scale(1.1); }
        }
        @keyframes overlay-fade {
            0% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }
        :root {
            --accent-olive: #8FAE1B;
            --matte-black: #000000;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "accent-olive": "#8FAE1B",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>
